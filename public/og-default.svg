<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(148,163,184,0.12)"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Amber accent bar -->
  <rect x="80" y="220" width="48" height="6" rx="3" fill="#F59E0B"/>

  <!-- Title -->
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#F1F5F9" letter-spacing="-1">Travel Coach 2026</text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">Planifica tu viaje al Mundial · EE.UU · Canadá · México</text>

  <!-- Badge -->
  <rect x="80" y="420" width="220" height="44" rx="8" fill="#F59E0B"/>
  <text x="190" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle" letter-spacing="0.08em">MUNDIAL 2026</text>

  <!-- Right decoration circles -->
  <circle cx="980" cy="315" r="180" fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="1"/>
  <circle cx="980" cy="315" r="130" fill="none" stroke="rgba(245,158,11,0.10)" stroke-width="1"/>
  <circle cx="980" cy="315" r="80" fill="none" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <circle cx="980" cy="315" r="30" fill="rgba(245,158,11,0.15)"/>
</svg>
